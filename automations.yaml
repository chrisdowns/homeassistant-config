- id: '1751310000000'
  alias: Lock Battery Low Warning
  description: Warn when a door lock battery is low. Z-Wave locks fire below 10%
    sustained for 12h (filters the erratic motor-load/temperature dips these locks
    report); Matter locks have no % — they fire on their own low-battery flag.
    Battery-% on these locks is coarse/unreliable, so treat as "go check the lock".
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.u_bolt_pro_z_wave_smart_lock_battery_level
    - sensor.exercise_room_lock_battery_level
    below: 10
    for: '12:00:00'
    id: zwave_low
  - trigger: state
    entity_id:
    - binary_sensor.level_bolt_matter_battery
    - binary_sensor.level_bolt_matter_battery_2
    - binary_sensor.level_bolt_matter_battery_3
    - binary_sensor.level_bolt_matter_battery_4
    to: 'on'
    for: '01:00:00'
    id: matter_low
  conditions: []
  actions:
  - variables:
      lock_name: '{{ trigger.to_state.attributes.friendly_name or trigger.entity_id }}'
      detail: >-
        {% if trigger.id == 'zwave_low' %}at {{ trigger.to_state.state }}% (below
        10%){% else %}reporting LOW battery{% endif %}
      msg_title: "\U0001F50B Lock battery low"
      msg_body: '{{ lock_name }} is {{ detail }} — replace the batteries.'
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_chriss_iphone
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_pixel_9_pro_xl
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
      notification_id: 'lock_batt_{{ trigger.entity_id }}'
    action: persistent_notification.create
  mode: parallel
  max: 6
