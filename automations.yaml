- id: '1751645000001'
  alias: Water Leak Sensors Offline
  description: A leak sensor dropped off Zigbee (dead battery, range) — leak and
    battery alerts are blind for it. Sweep trigger catches sensors already unavailable
    when automations reload (a reload cancels pending 'for:' timers without re-arming).
  triggers:
  - trigger: state
    id: transition
    entity_id:
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor_2
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor_3
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor_4
    - binary_sensor.kitchen_water_leak_sensor_kitchen_sink
    - binary_sensor.water_leak_sensor_meg_sink
    - binary_sensor.water_leak_sensor_chris_sink
    - binary_sensor.water_leak_sensor_laundry_sink
    - binary_sensor.water_leak_sensor_refrigerator
    - binary_sensor.water_leak_sensor_washer
    to: unavailable
    for:
      hours: 2
  - trigger: time
    id: sweep
    at:
    - 09:00:00
    - '15:00:00'
    - '21:00:00'
  conditions: []
  actions:
  - variables:
      offline_names: >-
        {{ expand('group.water_leak_sensors')
           | selectattr('state', 'eq', 'unavailable')
           | selectattr('last_changed', 'lt', now() - timedelta(hours=2))
           | map(attribute='name') | list }}
  - choose:
    - conditions:
      - condition: trigger
        id: transition
      sequence:
      - action: notify.mobile_app_pixel_9_pro_xl
        metadata: {}
        data:
          message: '{{ trigger.to_state.attributes.friendly_name }} has been offline
            for 2 hours - leak detection is blind there'
          title: Leak sensor offline - {{ trigger.to_state.attributes.friendly_name }}
      - action: notify.persistent_notification
        metadata: {}
        data:
          message: '{{ trigger.to_state.attributes.friendly_name }} has been offline
            for 2 hours - leak detection is blind there'
          title: Leak sensor offline - {{ trigger.to_state.attributes.friendly_name }}
    - conditions:
      - condition: trigger
        id: sweep
      - condition: template
        value_template: '{{ offline_names | count > 0 }}'
      sequence:
      - action: notify.mobile_app_pixel_9_pro_xl
        metadata: {}
        data:
          message: 'Offline over 2 hours - leak detection is blind there: {{ offline_names
            | join(", ") }}'
          title: '{{ offline_names | count }} leak sensor(s) offline'
      - action: notify.persistent_notification
        metadata: {}
        data:
          message: 'Offline over 2 hours - leak detection is blind there: {{ offline_names
            | join(", ") }}'
          title: '{{ offline_names | count }} leak sensor(s) offline'
  mode: queued
  max: 10
- id: '1751652000001'
  alias: Pantry Door Alert
  description: 'TESTING MODE: texts on every open AND close. Once verified, switch
    to a single left-open trigger (e.g. to "on" with for: 10 min) and drop the close
    trigger. Mobile push mirrors the SMS while the Twilio A2P campaign approval is
    pending.'
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.aqara_door_and_window_sensor_p2_door
    from: 'off'
    to: 'on'
    id: opened
  - trigger: state
    entity_id:
    - binary_sensor.aqara_door_and_window_sensor_p2_door
    from: 'on'
    to: 'off'
    id: closed
  conditions: []
  actions:
  - action: notify.twilio_sms
    metadata: {}
    data:
      message: Pantry door {{ trigger.id }} at {{ now().strftime('%-I:%M %p') }}
      target: '+16156691817'
  - action: notify.mobile_app_pixel_9_pro_xl
    metadata: {}
    data:
      message: Pantry door {{ trigger.id }} at {{ now().strftime('%-I:%M %p') }} (SMS
        mirror)
      title: Pantry door {{ trigger.id }}
  mode: queued
  max: 10
