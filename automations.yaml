- id: 0139eecc49564b9cbb54ae29c7785ea4
  alias: Lock Usage Notification
  description: Notify on real lock events with user attribution. Suppresses Matter-reconnect
    echoes (unavailable->locked matching last known state) via input_text.lock_last_state_*
    helpers. NEVER suppresses unlocked, except the nightly locking->unlocked retry
    artifact while timer.nightly_locking is active (covered by Overnight Unlocked
    Backstop + hourly nightly sweeps). Always notifies jammed.
  triggers:
  - platform: state
    entity_id:
    - lock.level_bolt_matter
    - lock.level_bolt_matter_2
    - lock.level_bolt_matter_3
    - lock.level_bolt_matter_4
    - lock.u_bolt_pro_z_wave_smart_lock
    - lock.exercise_room_lock
    to:
    - locked
    - unlocked
    - jammed
  conditions: []
  actions:
  - variables:
      user_map:
        7e22f9c9f122494f88e2b40d6d63007f: eedowns
        2bd3439aeb1347878ee12894e7d80b88: cndowns
        94047682c37040ffb8f81fb30231cf20: mmdowns
        4afda05ca7884aa9bc278eabc2cd3b8b: cdowns
        6dfa2c472f1248b5b3912ee6f147bcc1: emmy
        3fcc4a584aed4394925675d8330fac74: meghan
      who: '{{ user_map.get(trigger.to_state.context.user_id, ''physical/unknown'')
        }}'
      lock_name: '{{ trigger.to_state.name }}'
      new_state: '{{ trigger.to_state.state }}'
      old_state: '{{ trigger.from_state.state }}'
      helper: '{{ ''input_text.lock_last_state_'' ~ trigger.entity_id.split(''.'')[1]
        }}'
      stored: '{{ states(helper) }}'
      from_offline: '{{ old_state in [''unavailable'', ''unknown''] }}'
      nightly: '{{ is_state(''timer.nightly_locking'', ''active'') }}'
      notify_case: '{% if new_state == ''jammed'' %}jammed{% elif new_state == ''unlocked''
        %}{{ ''none'' if (nightly and old_state == ''locking'') else ''unlocked''
        }}{% elif from_offline %}{{ ''locked_offline'' if stored != ''locked'' else
        ''none'' }}{% elif nightly %}none{% else %}locked{% endif %}'
      msg_title: '{% if notify_case == ''jammed'' %}⚠️ Lock JAMMED{% elif notify_case
        == ''unlocked'' %}Lock Unlocked{% else %}Lock Locked{% endif %}'
      msg_body: '{% if notify_case == ''jammed'' %}{{ lock_name }} is JAMMED{% elif
        notify_case == ''unlocked'' %}{% if from_offline %}{{ lock_name }} is unlocked
        (reported after reconnecting){% else %}{{ lock_name }} was unlocked by {{
        who }}{% endif %}{% elif notify_case == ''locked_offline'' %}{{ lock_name
        }} was locked while offline{% else %}{{ lock_name }} was locked by {{ who
        }}{% endif %}'
  - action: input_text.set_value
    target:
      entity_id: '{{ helper }}'
    data:
      value: '{{ new_state }}'
  - if:
    - condition: template
      value_template: '{{ notify_case != ''none'' }}'
    then:
    - data:
        title: '{{ msg_title }}'
        message: '{{ msg_body }}'
      action: notify.mobile_app_chriss_iphone
    - data:
        title: '{{ msg_title }}'
        message: '{{ msg_body }}'
        data:
          channel: '{{ ''Critical Home Alerts'' if notify_case == ''jammed'' else ''Locks''
            }}'
          importance: '{{ ''high'' if notify_case == ''jammed'' else ''default'' }}'
          priority: high
          ttl: 0
      action: notify.mobile_app_pixel_9_pro_xl
  mode: queued
  max: 25
- id: '1751310000000'
  alias: Lock Battery Low Warning
  description: Warn when a door lock battery is low. Z-Wave locks fire below 10% sustained
    for 12h (filters the erratic motor-load/temperature dips these locks report);
    Matter locks have no % — they fire on their own low-battery flag. Battery-% on
    these locks is coarse/unreliable, so treat as "go check the lock".
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.u_bolt_pro_z_wave_smart_lock_battery_level
    - sensor.exercise_room_lock_battery_level
    below: 10
    for: '12:00:00'
    id: zwave_low
  - trigger: state
    entity_id:
    - binary_sensor.level_bolt_matter_battery
    - binary_sensor.level_bolt_matter_battery_2
    - binary_sensor.level_bolt_matter_battery_3
    - binary_sensor.level_bolt_matter_battery_4
    to: 'on'
    for: 01:00:00
    id: matter_low
  conditions: []
  actions:
  - variables:
      lock_name: '{{ trigger.to_state.attributes.friendly_name or trigger.entity_id
        }}'
      detail: '{% if trigger.id == ''zwave_low'' %}at {{ trigger.to_state.state }}%
        (below 10%){% else %}reporting LOW battery{% endif %}'
      msg_title: "\U0001F50B Lock battery low"
      msg_body: '{{ lock_name }} is {{ detail }} — replace the batteries.'
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_chriss_iphone
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_pixel_9_pro_xl
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
      notification_id: lock_batt_{{ trigger.entity_id }}
    action: persistent_notification.create
  mode: parallel
  max: 6
- id: a7c31b52de684f0f9d2e8b1c4a5f6073
  alias: Lock Offline Alert
  description: Notify when any lock has been unavailable for 15+ minutes (routine
    Matter flaps resolve in ~10 min and stay quiet). Covers the visibility gap while
    a lock is offline.
  triggers:
  - platform: state
    entity_id:
