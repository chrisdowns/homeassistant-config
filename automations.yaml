- id: '1732730930740'
  alias: Master Night Noise
  description: ''
  triggers:
  - at: '22:00:00'
    trigger: time
    id: start_noise
  - at: 09:00:00
    trigger: time
    id: stop_noise
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''stop_noise'' }}'
      sequence:
      - target:
          entity_id: media_player.master_bedroom_tv
        action: media_player.media_stop
        data: {}
    default:
    - repeat:
        until:
        - condition: template
          value_template: '{{ now().hour >= 9 and now().hour < 22 }}'
        sequence:
        - delay: 00:01:00
        - data:
            entity_id:
            - media_player.master_bedroom_tv
          action: homeassistant.update_entity
        - condition: template
          value_template: '{{ states(''media_player.master_bedroom_tv'') in [''paused'',
            ''idle'', ''off''] }}'
        - target:
            entity_id: media_player.master_bedroom_tv
          data:
            volume_level: 0.25
          action: media_player.volume_set
          continue_on_error: true
        - target:
            entity_id: media_player.master_bedroom_tv
          data:
            repeat: all
          action: media_player.repeat_set
          continue_on_error: true
        - target:
            entity_id: media_player.master_bedroom_tv
          action: sonos.play_queue
          data: {}
          continue_on_error: true
  mode: restart
- id: '1733074264311'
  alias: Nightly Door Lock
  triggers:
  - at: '21:00:00'
    trigger: time
  - at: '22:00:00'
    trigger: time
  - at: '23:00:00'
    trigger: time
  - at: 00:00:00
    trigger: time
  actions:
  - action: timer.start
    target:
      entity_id: timer.nightly_locking
  - repeat:
      for_each: '{{ locks }}'
      sequence:
      - data:
          lock_entity: '{{ repeat.item }}'
          notify: false
        action: script.ensure_a_lock_is_locked
        continue_on_error: true
  - variables:
      not_locked: "{% set ns = namespace(bad=[]) %}\n{% for l in locks %}\n  {% if
        states(l) not in ['locked', 'unavailable', 'unknown'] %}\n    {% set ns.bad
        = ns.bad + [state_attr(l, 'friendly_name') or l] %}\n  {% endif %}\n{% endfor
        %}\n{{ ns.bad }}"
      offline: "{% set ns = namespace(off=[]) %}\n{% for l in locks %}\n  {% if states(l)
        in ['unavailable', 'unknown'] %}\n    {% set ns.off = ns.off + [state_attr(l,
        'friendly_name') or l] %}\n  {% endif %}\n{% endfor %}\n{{ ns.off }}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ (not_locked | length + offline | length) > 0 }}'
      sequence:
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "\U0001F512 Nightly lock — {{ not_locked | length + offline | length
            }} NOT confirmed locked"
          message: '{% if not_locked | length > 0 %}Still unlocked: {{ not_locked
            | join('', '') }}{% endif %}{% if not_locked | length > 0 and offline
            | length > 0 %} — {% endif %}{% if offline | length > 0 %}Offline, state
            unverified: {{ offline | join('', '') }}{% endif %}'
          data:
            channel: Critical Home Alerts
            importance: high
            priority: high
            ttl: 0
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "\U0001F512 Nightly lock — {{ not_locked | length + offline | length
            }} NOT confirmed locked"
          message: '{% if not_locked | length > 0 %}Still unlocked: {{ not_locked
            | join('', '') }}{% endif %}{% if not_locked | length > 0 and offline
            | length > 0 %} — {% endif %}{% if offline | length > 0 %}Offline, state
            unverified: {{ offline | join('', '') }}{% endif %}'
      - action: notify.persistent_notification
        data:
          title: "\U0001F512 Nightly lock — {{ not_locked | length + offline | length
            }} NOT confirmed locked"
          message: '{% if not_locked | length > 0 %}Still unlocked: {{ not_locked
            | join('', '') }}{% endif %}{% if not_locked | length > 0 and offline
            | length > 0 %} — {% endif %}{% if offline | length > 0 %}Offline, state
            unverified: {{ offline | join('', '') }}{% endif %}'
    default:
    - data:
        title: "\U0001F512 Nightly lock ✅"
        message: All {{ locks | length }} locks are locked.
      action: notify.notify
  - action: timer.cancel
    target:
      entity_id: timer.nightly_locking
  variables:
    locks: '{{ state_attr(''group.door_locks'', ''entity_id'') | list }}'
  mode: single
