- id: '1759633138750'
  alias: GFCI Canaries – Notify on State Change
  initial_state: true
  triggers:
  - trigger: state
    entity_id:
    - light.back_porch_gfci
    - light.back_walkway_gfci
    - light.front_porch_outdoor
    - light.garage_bikes_gfci
    - light.garage_door_gfci
    - light.garage_freezer
    - light.garage_refrigerator
    - light.garage_shelves_gfci
    - light.garage_vacuum_gfci
    - light.irrigation_control
    - light.old_grill_area_gfci
    - light.outdoor_kitchen_gfci
    - light.pool_equip_gfci_1
    - light.pool_equip_gfci_2
    - light.right_side_electr_gfci
    - light.water_heater_gfci
  conditions:
  - condition: template
    value_template: "{{ trigger.from_state is not none\n   and trigger.to_state is
      not none\n   and trigger.from_state.state != trigger.to_state.state }}\n"
  actions:
  - data:
      title: GFCI Canary State Changed
      message: "{{ trigger.to_state.attributes.friendly_name or trigger.entity_id
        }}\nchanged from \"{{ trigger.from_state.state }}\" to \"{{ trigger.to_state.state
        }}\"."
    action: notify.notify
  mode: parallel
  max: 10
- id: '1759633186528'
  alias: GFCI Canaries – 9 PM State Check
  initial_state: true
  triggers:
  - at: '21:00:00'
    trigger: time
  variables:
    canaries: "{{ state_attr('group.gfci_canaries', 'entity_id') | list }}"
    not_on: "{% set ns = namespace(bad=[]) %}\n{% for e in canaries %}\n  {% if not
      is_state(e, 'on') %}\n    {% set ns.bad = ns.bad + [(state_attr(e, 'friendly_name')
      or e) ~ ' (' ~ states(e) ~ ')'] %}\n  {% endif %}\n{% endfor %}\n{{ ns.bad }}"
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not_on | length > 0 }}'
      sequence:
      - data:
          title: GFCI Canaries ⚠️ {{ not_on | length }} not ON at 9 PM
          message: 'Not ON: {{ not_on | join('', '') }}'
        action: notify.notify
    default:
    - data:
        title: GFCI Canaries ✅
        message: All {{ canaries | length }} canaries are ON at 9 PM.
      action: notify.notify
  mode: single
- id: 0139eecc49564b9cbb54ae29c7785ea4
