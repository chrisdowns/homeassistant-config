- id: '1751645000001'
  alias: Water Leak Sensors Offline
  description: A leak sensor dropped off Zigbee (dead battery, range) — leak and battery
    alerts are blind for it. Sweep trigger catches sensors already unavailable when
    automations reload (a reload cancels pending 'for:' timers without re-arming).
  triggers:
  - trigger: state
    id: transition
    entity_id:
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor_2
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor_3
    - binary_sensor.ikea_of_sweden_badring_water_leakage_sensor_4
    - binary_sensor.kitchen_water_leak_sensor_kitchen_sink
    - binary_sensor.water_leak_sensor_meg_sink
    - binary_sensor.water_leak_sensor_chris_sink
    - binary_sensor.water_leak_sensor_laundry_sink
    - binary_sensor.water_leak_sensor_refrigerator
    - binary_sensor.water_leak_sensor_washer
    to: unavailable
    for:
      hours: 2
  - trigger: time
    id: sweep
    at:
    - 09:00:00
    - '15:00:00'
    - '21:00:00'
  conditions: []
  actions:
  - variables:
      offline_names: "{{ expand('group.water_leak_sensors')\n   | selectattr('state',
        'eq', 'unavailable')\n   | selectattr('last_changed', 'lt', now() - timedelta(hours=2))\n
        \  | map(attribute='name') | list }}"
  - choose:
    - conditions:
      - condition: trigger
        id: transition
      sequence:
      - action: notify.mobile_app_chriss_iphone
        metadata: {}
        data:
          message: '{{ trigger.to_state.attributes.friendly_name }} has been offline
            for 2 hours - leak detection is blind there'
          title: Leak sensor offline - {{ trigger.to_state.attributes.friendly_name
            }}
      - action: notify.mobile_app_pixel_9_pro_xl
        metadata: {}
        data:
          message: '{{ trigger.to_state.attributes.friendly_name }} has been offline
            for 2 hours - leak detection is blind there'
          title: Leak sensor offline - {{ trigger.to_state.attributes.friendly_name
            }}
          data:
            channel: Critical Home Alerts
            importance: high
            priority: high
            ttl: 0
      - action: notify.persistent_notification
        metadata: {}
        data:
          message: '{{ trigger.to_state.attributes.friendly_name }} has been offline
            for 2 hours - leak detection is blind there'
          title: Leak sensor offline - {{ trigger.to_state.attributes.friendly_name
            }}
    - conditions:
      - condition: trigger
        id: sweep
      - condition: template
        value_template: '{{ offline_names | count > 0 }}'
      sequence:
      - action: notify.mobile_app_chriss_iphone
        metadata: {}
        data:
          message: 'Offline over 2 hours - leak detection is blind there: {{ offline_names
            | join(", ") }}'
          title: '{{ offline_names | count }} leak sensor(s) offline'
      - action: notify.mobile_app_pixel_9_pro_xl
        metadata: {}
        data:
          message: 'Offline over 2 hours - leak detection is blind there: {{ offline_names
            | join(", ") }}'
          title: '{{ offline_names | count }} leak sensor(s) offline'
          data:
            channel: Critical Home Alerts
            importance: high
            priority: high
            ttl: 0
      - action: notify.persistent_notification
        metadata: {}
        data:
          message: 'Offline over 2 hours - leak detection is blind there: {{ offline_names
            | join(", ") }}'
          title: '{{ offline_names | count }} leak sensor(s) offline'
  mode: queued
  max: 10
