    - lock.level_bolt_matter_4
    - lock.u_bolt_pro_z_wave_smart_lock
    - lock.exercise_room_lock
    to: unavailable
    for: 00:15:00
  conditions: []
  actions:
  - data:
      title: Lock OFFLINE
      message: '{{ trigger.to_state.name }} has been offline for 15+ minutes — no
        lock events will be seen until it reconnects'
