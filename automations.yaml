- id: '1759633138750'
  alias: GFCI Canaries – Notify on State Change
  initial_state: true
  triggers:
  - trigger: state
    entity_id:
    - light.back_porch_gfci
    - light.back_walkway_gfci
    - light.front_porch_outdoor
    - light.garage_bikes_gfci
    - light.garage_door_gfci
    - light.garage_freezer
    - light.garage_refrigerator
    - light.garage_shelves_gfci
    - light.garage_vacuum_gfci
    - light.irrigation_control
    - light.old_grill_area_gfci
    - light.outdoor_kitchen_gfci
    - light.pool_equip_gfci_1
    - light.pool_equip_gfci_2
    - light.right_side_electr_gfci
    - light.water_heater_gfci
  conditions:
  - condition: template
    value_template: "{{ trigger.from_state is not none\n   and trigger.to_state is
      not none\n   and trigger.from_state.state != trigger.to_state.state }}\n"
  actions:
  - data:
      title: GFCI Canary State Changed
      message: "{{ trigger.to_state.attributes.friendly_name or trigger.entity_id
        }}\nchanged from \"{{ trigger.from_state.state }}\" to \"{{ trigger.to_state.state
        }}\"."
    action: notify.notify
  mode: parallel
  max: 10
- id: '1759633186528'
  alias: GFCI Canaries – 9 PM State Check
  initial_state: true
  triggers:
  - at: '21:00:00'
    trigger: time
  variables:
    canaries: "{{ state_attr('group.gfci_canaries', 'entity_id') | list }}"
    not_on: "{% set ns = namespace(bad=[]) %}\n{% for e in canaries %}\n  {% if not
      is_state(e, 'on') %}\n    {% set ns.bad = ns.bad + [(state_attr(e, 'friendly_name')
      or e) ~ ' (' ~ states(e) ~ ')'] %}\n  {% endif %}\n{% endfor %}\n{{ ns.bad }}"
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not_on | length > 0 }}'
      sequence:
      - data:
          title: GFCI Canaries ⚠️ {{ not_on | length }} not ON at 9 PM
          message: 'Not ON: {{ not_on | join('', '') }}'
        action: notify.notify
    default:
    - data:
        title: GFCI Canaries ✅
        message: All {{ canaries | length }} canaries are ON at 9 PM.
      action: notify.notify
  mode: single
- id: 0139eecc49564b9cbb54ae29c7785ea4
  alias: Lock Usage Notification
  description: Notify admin when any lock is toggled, with user attribution
  triggers:
  - platform: state
    entity_id:
    - lock.level_bolt_matter
    - lock.level_bolt_matter_2
    - lock.level_bolt_matter_3
    - lock.level_bolt_matter_4
    - lock.u_bolt_pro_z_wave_smart_lock
    - lock.exercise_room_lock
    to:
    - locked
    - unlocked
    - jammed
  conditions:
  - condition: template
    value_template: "{{ not is_state('timer.nightly_locking', 'active') }}"
  actions:
  - variables:
      user_map:
        7e22f9c9f122494f88e2b40d6d63007f: eedowns
        2bd3439aeb1347878ee12894e7d80b88: cndowns
        94047682c37040ffb8f81fb30231cf20: mmdowns
        4afda05ca7884aa9bc278eabc2cd3b8b: cdowns
        6dfa2c472f1248b5b3912ee6f147bcc1: emmy
        3fcc4a584aed4394925675d8330fac74: meghan
      who: '{{ user_map.get(trigger.to_state.context.user_id, ''physical/unknown'')
        }}'
      lock_name: '{{ trigger.to_state.attributes.friendly_name }}'
      new_state: '{{ trigger.to_state.state }}'
      msg_title: 'Lock {{ new_state | title }}'
      msg_body: '{{ lock_name }} was {{ new_state }} by {{ who }}'
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_chriss_iphone
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_pixel_9_pro_xl
  mode: parallel
  max: 10
- id: '1751310000000'
  alias: Lock Battery Low Warning
  description: Warn when a door lock battery is low. Z-Wave locks fire below 10%
    sustained for 12h (filters the erratic motor-load/temperature dips these locks
    report); Matter locks have no % — they fire on their own low-battery flag.
    Battery-% on these locks is coarse/unreliable, so treat as "go check the lock".
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.u_bolt_pro_z_wave_smart_lock_battery_level
    - sensor.exercise_room_lock_battery_level
    below: 10
    for: '12:00:00'
    id: zwave_low
  - trigger: state
    entity_id:
    - binary_sensor.level_bolt_matter_battery
    - binary_sensor.level_bolt_matter_battery_2
    - binary_sensor.level_bolt_matter_battery_3
    - binary_sensor.level_bolt_matter_battery_4
    to: 'on'
    for: '01:00:00'
    id: matter_low
  conditions: []
  actions:
  - variables:
      lock_name: '{{ trigger.to_state.attributes.friendly_name or trigger.entity_id }}'
      detail: >-
        {% if trigger.id == 'zwave_low' %}at {{ trigger.to_state.state }}% (below
        10%){% else %}reporting LOW battery{% endif %}
      msg_title: "\U0001F50B Lock battery low"
      msg_body: '{{ lock_name }} is {{ detail }} — replace the batteries.'
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_chriss_iphone
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
    action: notify.mobile_app_pixel_9_pro_xl
  - data:
      title: '{{ msg_title }}'
      message: '{{ msg_body }}'
      notification_id: 'lock_batt_{{ trigger.entity_id }}'
    action: persistent_notification.create
  mode: parallel
  max: 6
