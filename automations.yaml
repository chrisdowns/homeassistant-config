- id: '1732730930740'
  alias: Master Night Noise
  description: ''
  triggers:
  - at: '22:00:00'
    trigger: time
  - at: 09:00:00
    trigger: time
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ now().hour == 9 and now().minute == 0 }}'
      sequence:
      - target:
          entity_id: media_player.master_bedroom_tv
        action: media_player.media_stop
        data: {}
    default:
    - repeat:
        until:
        - condition: template
          value_template: '{{ now().hour == 7 and now().minute == 0 }}'
        sequence:
        - delay: 00:01:00
        - data:
            entity_id:
            - media_player.master_bedroom_tv
          action: homeassistant.update_entity
        - condition: template
          value_template: '{{ states(''media_player.master_bedroom_tv'') in [''paused'',
            ''idle'', ''off''] }}'
        - target:
            entity_id: media_player.master_bedroom_tv
          data:
            volume_level: 0.25
          action: media_player.volume_set
        - target:
            entity_id: media_player.master_bedroom_tv
          action: sonos.play_queue
          data: {}
  mode: restart
- id: '1733074264311'
  alias: Nightly Door Lock
  triggers:
  - at: '21:00:00'
    trigger: time
  - at: '22:00:00'
    trigger: time
  - at: '23:00:00'
    trigger: time
  - at: 00:00:00
    trigger: time
  actions:
  - parallel:
    - data:
        lock_entity: lock.level_bolt_matter
      action: script.ensure_a_lock_is_locked
    - data:
        lock_entity: lock.level_bolt_matter_2
      action: script.ensure_a_lock_is_locked
    - data:
        lock_entity: lock.level_bolt_matter_3
      action: script.ensure_a_lock_is_locked
    - data:
        lock_entity: lock.u_bolt_pro_z_wave_smart_lock
      action: script.ensure_a_lock_is_locked
    - data:
        lock_entity: lock.level_bolt_matter_4
      action: script.ensure_a_lock_is_locked
    - data:
        lock_entity: lock.exercise_room_lock
      action: script.ensure_a_lock_is_locked
  mode: parallel
