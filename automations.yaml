- id: '1732730930740'
  alias: Master Night Noise
  description: ''
  triggers:
  - at: '22:00:00'
    trigger: time
    id: start_noise
  - at: '09:00:00'
    trigger: time
    id: stop_noise
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''stop_noise'' }}'
      sequence:
      - target:
          entity_id: media_player.master_bedroom_tv
        action: media_player.media_stop
        data: {}
    default:
    - repeat:
        until:
        - condition: template
          value_template: '{{ now().hour >= 9 and now().hour < 22 }}'
        sequence:
        - delay: 00:01:00
        - data:
            entity_id:
            - media_player.master_bedroom_tv
          action: homeassistant.update_entity
        - condition: template
          value_template: '{{ states(''media_player.master_bedroom_tv'') in [''paused'',
            ''idle'', ''off''] }}'
        - target:
            entity_id: media_player.master_bedroom_tv
          data:
            volume_level: 0.25
          action: media_player.volume_set
          continue_on_error: true
        - target:
            entity_id: media_player.master_bedroom_tv
          data:
            repeat: all
          action: media_player.repeat_set
          continue_on_error: true
        - target:
            entity_id: media_player.master_bedroom_tv
          action: sonos.play_queue
          data: {}
          continue_on_error: true
  mode: restart
- id: '1733074264311'
  alias: Nightly Door Lock
  triggers:
  - at: '21:00:00'
    trigger: time
  - at: '22:00:00'
    trigger: time
  - at: '23:00:00'
    trigger: time
  - at: 00:00:00
    trigger: time
  variables:
    locks: "{{ state_attr('group.door_locks', 'entity_id') | list }}"
  actions:
  - action: timer.start
    target:
      entity_id: timer.nightly_locking
  - repeat:
      for_each: '{{ locks }}'
      sequence:
      - data:
          lock_entity: '{{ repeat.item }}'
          notify: false
        action: script.ensure_a_lock_is_locked
  - variables:
      not_locked: "{% set ns = namespace(bad=[]) %}\n{% for l in locks %}\n  {% if
        not is_state(l, 'locked') %}\n    {% set ns.bad = ns.bad + [state_attr(l, 'friendly_name')
        or l] %}\n  {% endif %}\n{% endfor %}\n{{ ns.bad }}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not_locked | length > 0 }}'
      sequence:
      - data:
          title: 🔒 Nightly lock — {{ not_locked | length }} NOT locked
          message: 'Still unlocked: {{ not_locked | join('', '') }}'
        action: notify.notify
    default:
    - data:
        title: 🔒 Nightly lock ✅
        message: All {{ locks | length }} locks are locked.
      action: notify.notify
  - action: timer.cancel
    target:
      entity_id: timer.nightly_locking
  mode: single
