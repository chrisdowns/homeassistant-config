- id: '1736646895746'
  alias: Keep Switches ON
  description: Automatically turn outlets back on if they are switched off.
  triggers:
  - entity_id:
    - switch.master_outlets
    - switch.downstairs_hallway
    - switch.living_room_floor_plugs
    to: 'off'
    trigger: state
  actions:
  - target:
      entity_id:
      - switch.master_outlets
      - switch.downstairs_hallway
      - switch.living_room_floor_plugs
    action: switch.turn_on
  mode: single
- id: '1759633138750'
  alias: GFCI Canaries – Notify on State Change (true state only)
  triggers:
  - event_type: state_changed
    trigger: event
  conditions:
  - condition: template
    value_template: '{{ trigger.event.data.entity_id in member_set }}

      '
  - condition: template
    value_template: "{{ trigger.event.data.old_state is not none\n   and trigger.event.data.new_state
      is not none\n   and trigger.event.data.old_state.state != trigger.event.data.new_state.state
      }}\n"
  actions:
  - data:
      title: GFCI Canary State Changed
      message: "{{ state_attr(trigger.event.data.entity_id, 'friendly_name')\n   or
        trigger.event.data.entity_id }}\nchanged from \"{{ trigger.event.data.old_state.state
        }}\" to \"{{ trigger.event.data.new_state.state }}\"."
    action: notify.notify
  mode: parallel
  variables:
    member_ids: "{{\n  (state_attr('light.gfci_canaries', 'entity_id') or []) +\n
      \ (state_attr('group.gfci_canaries', 'entity_id') or [])\n}}"
    member_set: '{{ member_ids | list }}'
- id: '1759633186528'
  alias: GFCI Canaries – 9 PM State Check
  triggers:
  - at: '21:00:00'
    trigger: time
  actions:
  - data:
      title: GFCI Canaries – debug
      message: Resolved {{ plugs|length }} members from your canaries group.
    action: notify.notify
  - choose:
    - conditions: '{{ not_on | length > 0 }}'
      sequence:
      - data:
          title: GFCI Canaries ⚠️ Some Off at 9 PM
          message: 'These are not ON: {{ not_on | join('', '') }}'
        action: notify.notify
    default:
    - data:
        title: GFCI Canaries ✅
        message: All {{ plugs | length }} canaries are ON at 9 PM.
      action: notify.notify
  mode: single
  variables:
    member_ids: "{{\n  (state_attr('light.gfci_canaries', 'entity_id') or []) +\n
      \ (state_attr('group.gfci_canaries', 'entity_id') or [])\n}}"
    plugs: '{{ expand(member_ids) }}'
    not_on: "{{ plugs\n   | selectattr('state', 'ne', 'on')\n   | map(attribute='name')\n
      \  | list }}"
- id: 0139eecc49564b9cbb54ae29c7785ea4
  alias: Lock Usage Notification
  description: Notify admin when any lock is toggled, with user attribution
  triggers:
  - platform: state
    entity_id:
    - lock.level_bolt_matter
    - lock.level_bolt_matter_2
    - lock.level_bolt_matter_3
    - lock.level_bolt_matter_4
    - lock.u_bolt_pro_z_wave_smart_lock
    - lock.exercise_room_lock
    to:
    - locked
    - unlocked
  conditions: []
  actions:
  - variables:
      user_map:
        7e22f9c9f122494f88e2b40d6d63007f: eedowns
        2bd3439aeb1347878ee12894e7d80b88: cndowns
        94047682c37040ffb8f81fb30231cf20: mmdowns
        4afda05ca7884aa9bc278eabc2cd3b8b: cdowns
        6dfa2c472f1248b5b3912ee6f147bcc1: emmy
        3fcc4a584aed4394925675d8330fac74: meghan
      who: '{{ user_map.get(trigger.to_state.context.user_id, ''physical/unknown'')
        }}'
      lock_name: '{{ trigger.to_state.attributes.friendly_name }}'
      new_state: '{{ trigger.to_state.state }}'
  - data:
      title: Lock {{ new_state | title }}
      message: '{{ lock_name }} was {{ new_state }} by {{ who }}'
    action: notify.mobile_app_chriss_iphone
  - data:
      title: Lock {{ new_state | title }}
      message: '{{ lock_name }} was {{ new_state }} by {{ who }}'
    action: notify.mobile_app_pixel_9_pro_xl
  mode: parallel
  max: 10
