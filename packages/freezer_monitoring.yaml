# Freezer / Fridge Temperature Monitoring — HA package
# ---------------------------------------------------------------------------
# Deploy: copy to the Green at /config/packages/freezer_monitoring.yaml.
# configuration.yaml already includes:
#   homeassistant:
#     packages: !include_dir_named packages
#
# Sensor map (current 2026-07-18):
#   Garage freezer       = 592TXR "Acurite-Tower" ch B (id 2082) — temp+humidity
#   Garage fridge        = 592TXR "Acurite-Tower" ch A (id 13260) — temp+humidity
#   Kitchen fridge       = 606TX "Acurite-606TX" (id 126) — TEMP ONLY
#   Garage fridge-freezer= 606TX "Acurite-606TX" (id 174) — TEMP ONLY
#   The two 606s SHARE topic Acurite-606TX/1 (no channel switch) — split by `id`
#   in each value_template (see the 606 section below).
#   Outdoor kitchen fridge= Acurite-00276rm monitor (id 5978) + 06011RM PROBE —
#     probe temp in temperature_1_C (inside the box), body/ambient in temperature_C.
#
# 592TXR Towers key on the A/B/C slide switch (STABLE; device id rotates on
# battery change). 606TX has no switch — rtl_433 always tags it channel 1, so it
# publishes to rtl_433/devices/Acurite-606TX/1. Topics never collide.
#
# History note: channel A (592TXR id 13260, has humidity) WAS the kitchen fridge,
# then briefly the outdoor fridge, then parked. On 2026-07-15 it was placed in the
# GARAGE FRIDGE and wired up here. The kitchen fridge runs on the 606 now — the
# 606 couldn't reach from the OUTDOOR kitchen fridge (metal box + distance blocks
# 433MHz, even the stronger Tower went silent sealed inside), but it's rock-solid
# at the indoor kitchen fridge.
#
# Outdoor kitchen fridge: WIRED 2026-07-18 — AcuRite 00276rm monitor + 06011RM
# plug-in probe. rtl_433 decodes it as "Acurite-00276rm" (the earlier "00275rm"
# guess was wrong — verified off the live stream). PROBE temp = temperature_1_C
# (probe on a lead INSIDE the box), body/ambient = temperature_C. This keeps the
# transmitter OUTSIDE the metal box — the only architecture that beats the
# Faraday cage. (The 986 was a WRONG call — its pucks mount inside → same failure
# as the 606.) That spot was marginal even open-air, so it likely still wants
# receiver-side RF help; expire_after is set generous (900s) pending observed
# reception density at the real location.
#
# rtl_433 publishes per-device JSON to rtl_433/devices/<model>/<channel>. Tower
# keys: temperature_C, humidity, battery_ok, channel; 606TX: no humidity.
# expire_after (offline window) is per-sensor. Sniff live stream to debug:
#   ssh ha-green → mosquitto_sub -h core-mosquitto -u rtl433 -P <pw> -t 'rtl_433/devices/#' -v
#   (broker creds live in the mosquitto add-on options via the supervisor API)
#
# NOTE (2026-07-14): the SDR also hears an Acurite-609TXC (id 204) reporting a
# LOW battery — a one-piece temp+humidity sensor (NOT a probe model),
# unidentified/unplaced, intentionally NOT wired here yet.
# ---------------------------------------------------------------------------

mqtt:
  sensor:
    # ==== Garage freezer : channel B ====
    - name: "Garage Freezer Temperature"
      unique_id: frzmon_garage_freezer_temp
      state_topic: "rtl_433/devices/Acurite-Tower/B"
      value_template: >-
        {% if value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 600
    - name: "Garage Freezer Humidity"
      unique_id: frzmon_garage_freezer_humidity
      state_topic: "rtl_433/devices/Acurite-Tower/B"
      value_template: "{{ value_json.humidity | int }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 600

    # ==== Garage refrigerator : channel A (592TXR id 13260) ====
    - name: "Garage Fridge Temperature"
      unique_id: frzmon_garage_fridge_temp
      state_topic: "rtl_433/devices/Acurite-Tower/A"
      value_template: >-
        {% if value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 600
    - name: "Garage Fridge Humidity"
      unique_id: frzmon_garage_fridge_humidity
      state_topic: "rtl_433/devices/Acurite-Tower/A"
      value_template: "{{ value_json.humidity | int }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 600

    # ==== Two Acurite-606TX share ONE topic — filter by `id` (temp-only) ====
    # The 606TX has NO channel switch, so rtl_433 tags EVERY 606 as channel 1 →
    # both publish to rtl_433/devices/Acurite-606TX/1. They're told apart ONLY by
    # the `id` field in the payload, so each sensor's value_template must gate on
    # its id and return `this.state` for the other unit's messages (else the two
    # readings clobber each other). 606 ids are stable (unlike the Towers, whose
    # ids rotate on battery swap — that's why Towers key on the A/B/C channel).
    #   id 126 = Kitchen fridge (indoor, ~33°F). id 174 = Garage Fridge-Freezer
    #   (the combo garage fridge's FREEZER compartment; distinct from the
    #   standalone chest "Garage Freezer" on Tower/B).
    # Caveat: expire_after resets on ANY 606 message on the shared topic, so
    # per-unit OFFLINE detection is weak — a single 606 dying isn't flagged offline
    # while the other still transmits (low-battery alert still covers battery death;
    # total SDR/reception loss still trips offline for both).
    - name: "Kitchen Fridge Temperature"
      unique_id: frzmon_kitchen_fridge_temp
      state_topic: "rtl_433/devices/Acurite-606TX/1"
      value_template: >-
        {% if value_json.id == 126 and value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 600

    # ==== Garage Fridge-Freezer : Acurite-606TX id 174 (temp-only) ====
    - name: "Garage Fridge-Freezer Temperature"
      unique_id: frzmon_garage_fridge_freezer_temp
      state_topic: "rtl_433/devices/Acurite-606TX/1"
      value_template: >-
        {% if value_json.id == 174 and value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 600

    # ==== Outdoor kitchen fridge : Acurite-00276rm (id 5978) + 06011RM probe ====
    # rtl_433 decodes this monitor as model "Acurite-00276rm" (NOT 00275rm as the
    # earlier plan guessed — verified off the live MQTT stream 2026-07-18). The
    # transmitter body stays OUTSIDE the metal fridge; the plug-in PROBE on a lead
    # runs through the gasket into the cold space and its reading comes out in
    # `temperature_1_C` (the onboard body sensor is `temperature_C` = ambient).
    # Unique model topic → no channel switch and no topic-sharing sibling, so a
    # simple field-presence guard is enough. Deliberately NOT gated on id:5978 —
    # unlike the stable-id 606s (which SHARE a topic and MUST be split by id), this
    # model has its own topic, and whether its id survives a battery swap is unknown;
    # gating on an id that might rotate would silently kill the sensor after a swap.
    # expire_after 900 is PROVISIONAL — this spot is a known marginal 433 link, so
    # widen it if offline false-flaps, tighten toward 600 if reception proves solid.
    - name: "Outdoor Kitchen Fridge Temperature"
      unique_id: frzmon_outdoor_kitchen_fridge_temp   # reserved slot → binds sensor.outdoor_kitchen_fridge_temperature
      state_topic: "rtl_433/devices/Acurite-00276rm"
      value_template: >-
        {% if value_json.temperature_1_C is defined %}
          {{ (value_json.temperature_1_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 900
    # Onboard body sensor = outdoor AMBIENT. Useful context for an outdoor unit:
    # tells a hot-day rise apart from an actual fridge failure. (Not in a reserved
    # slot — new entity sensor.outdoor_kitchen_fridge_ambient.)
    - name: "Outdoor Kitchen Fridge Ambient"
      unique_id: frzmon_outdoor_kitchen_fridge_ambient
      state_topic: "rtl_433/devices/Acurite-00276rm"
      value_template: >-
        {% if value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 900

  binary_sensor:
    - name: "Garage Freezer Sensor Battery"
      unique_id: frzmon_garage_freezer_batt
      state_topic: "rtl_433/devices/Acurite-Tower/B"
      value_template: "{{ value_json.battery_ok | int }}"
      payload_on: "0"        # battery_ok = 0 -> low (device_class battery: on = low)
      payload_off: "1"
      device_class: battery
      expire_after: 600
    - name: "Garage Fridge Sensor Battery"
      unique_id: frzmon_garage_fridge_batt
      state_topic: "rtl_433/devices/Acurite-Tower/A"
      value_template: "{{ value_json.battery_ok | int }}"
      payload_on: "0"
      payload_off: "1"
      device_class: battery
      expire_after: 600
    # Two 606s share this topic — gate on id, hold prior state otherwise
    # (this.state is "on"/"off" post-mapping → re-emit as "0"/"1").
    - name: "Kitchen Fridge Sensor Battery"
      unique_id: frzmon_kitchen_fridge_batt
      state_topic: "rtl_433/devices/Acurite-606TX/1"
      value_template: >-
        {% if value_json.id == 126 %}{{ value_json.battery_ok | int }}
        {% else %}{{ '0' if this.state == 'on' else '1' }}{% endif %}
      payload_on: "0"
      payload_off: "1"
      device_class: battery
      expire_after: 600
    - name: "Garage Fridge-Freezer Sensor Battery"
      unique_id: frzmon_garage_fridge_freezer_batt
      state_topic: "rtl_433/devices/Acurite-606TX/1"
      value_template: >-
        {% if value_json.id == 174 %}{{ value_json.battery_ok | int }}
        {% else %}{{ '0' if this.state == 'on' else '1' }}{% endif %}
      payload_on: "0"
      payload_off: "1"
      device_class: battery
      expire_after: 600
    # Outdoor kitchen fridge monitor (Acurite-00276rm) — own topic, simple guard.
    - name: "Outdoor Kitchen Fridge Sensor Battery"
      unique_id: frzmon_outdoor_kitchen_fridge_batt   # reserved slot → binds binary_sensor.outdoor_kitchen_fridge_sensor_battery
      state_topic: "rtl_433/devices/Acurite-00276rm"
      value_template: "{{ value_json.battery_ok | int }}"
      payload_on: "0"        # battery_ok = 0 -> low
      payload_off: "1"
      device_class: battery
      expire_after: 900

# ---------------------------------------------------------------------------
# Rate-of-rise detectors (door-ajar / slow-failure early warning) — STANDARD on
# every temp sensor. A sustained upward slope catches a cracked door or dying
# unit while the box is still in-range, long before the absolute threshold.
# min_gradient is in °F/second (F-per-hour / 3600). Two class presets:
#
#   FREEZER-CLASS  (baseline ~dead-flat, e.g. garage freezer stdev 0.21F):
#       5 F/hr · 30-min window (1800s) · automation for:5min · min_samples 5
#   FRIDGE-CLASS   (compressor cycle + frequent door-grabs, steady stdev ~0.7F):
#       8 F/hr · 45-min window (2700s) · automation for:20min · min_samples 4
#     -> the longer window + longer sustained `for` is what separates a real
#        door-ajar from a self-reversing cycle; fridge numbers are conservative
#        (protect against alert fatigue) and reviewable once each unit has a few
#        undisturbed days of clean data.
# Each *_rising binary_sensor pairs with an automation gated BELOW that unit's
# warn line, so it never double-fires with the absolute warn.
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: trend
    sensors:
      garage_freezer_rising:            # freezer-class: 5 F/hr over 30 min
        friendly_name: "Garage Freezer Rising"
        entity_id: sensor.garage_freezer_temperature
        sample_duration: 1800
        min_gradient: 0.001389
        min_samples: 5
        max_samples: 50
      garage_fridge_rising:             # fridge-class: 8 F/hr over 45 min
        friendly_name: "Garage Fridge Rising"
        entity_id: sensor.garage_fridge_temperature
        sample_duration: 2700
        min_gradient: 0.002222
        min_samples: 4
        max_samples: 60
      kitchen_fridge_rising:            # fridge-class: 8 F/hr over 45 min
        friendly_name: "Kitchen Fridge Rising"
        entity_id: sensor.kitchen_fridge_temperature
        sample_duration: 2700
        min_gradient: 0.002222
        min_samples: 4
        max_samples: 60
      garage_fridge_freezer_rising:     # fridge-class, DEFROST-TOLERANT: ~13 F/hr over 45 min
        # min_gradient raised 0.002222->0.0035 (2026-07-23): the daily auto-defrost
        # ramps ~1.1 F/min (66 F/hr) but the 8 F/hr setting also tripped on normal
        # band drift/reload noise. LOW CONFIDENCE — revisit after a week of data.
        friendly_name: "Garage Fridge-Freezer Rising"
        entity_id: sensor.garage_fridge_freezer_temperature
        sample_duration: 2700
        min_gradient: 0.0035
        min_samples: 4
        max_samples: 60
      outdoor_kitchen_fridge_rising:    # fridge-class: 8 F/hr over 45 min (probe is inside the box, so outdoor ambient swings don't reach it)
        # WATCH: needs >=4 samples in the 45-min window; if the marginal link
        # delivers points too sparsely this may never populate — reassess once we
        # see real reception density. Re-tune off a settled baseline after a few days.
        friendly_name: "Outdoor Kitchen Fridge Rising"
        entity_id: sensor.outdoor_kitchen_fridge_temperature
        sample_duration: 2700
        min_gradient: 0.002222
        min_samples: 4
        max_samples: 60

automation:
  # ============================================================================
  # Temperature alerts — ALL units in ONE automation (2026-07-23 consolidation of
  # the former 15 per-unit warn/urgent/rising automations). Per-unit thresholds
  # live in the trigger table below; trigger.id (warn|urgent) is the case switch
  # that routes severity/channel. HA does NOT allow templating numeric_state
  # `above:`, so each unit keeps its own trigger row — but not its own automation.
  # All notifications route through script.frzmon_notify (both phones, one place).
  #
  # Thresholds retuned 2026-07-23 off 7 days of live data — DURATION-based, not
  # amplitude-based, so a slow failure that plateaus at a low temp is still caught
  # while normal auto-defrost humps (narrow, <=27 min wide) are filtered out:
  #   Garage freezer        warn >-5/20m            urgent >10/10m   (unchanged; quiet)
  #   Garage fridge         warn >42/20m + >40/2h   urgent >45/10m
  #     >42 catches a fast rise; >40-for-2h catches a stuck-at-41 drift. Both sit
  #     inside the USDA <=40-for-2h food-safety line. 43°F was actually seen 07-16.
  #   Kitchen fridge        warn >40/10m            urgent >45/10m   (unchanged; quiet)
  #   Garage fridge-freezer warn >10/45m            urgent >15/35m
  #     Defrost sustains <=27m above 10°F and <=20m above 15°F, so the long `for`
  #     filters it. The LOW absolute thresholds are kept on purpose: raising them
  #     to >25/>32 would be fail-deadly — a real failure that plateaus in the
  #     10-25°F band would never trip, and >32 only alerts at the food-melt line.
  #   Outdoor kitchen fridge: OMITTED until the ESPHome unit lands (was disabled).
  # ============================================================================
  - id: frzmon_temp_alerts
    alias: "Freezer monitor — temperature alerts (all units)"
    mode: parallel
    max: 20
    trigger:
      - { platform: numeric_state, id: warn,   entity_id: sensor.garage_freezer_temperature,        above: -5, for: { minutes: 20 } }
      - { platform: numeric_state, id: urgent, entity_id: sensor.garage_freezer_temperature,        above: 10, for: { minutes: 10 } }
      - { platform: numeric_state, id: warn,   entity_id: sensor.garage_fridge_temperature,         above: 42, for: { minutes: 20 } }
      - { platform: numeric_state, id: warn,   entity_id: sensor.garage_fridge_temperature,         above: 40, for: { hours: 2 } }
      - { platform: numeric_state, id: urgent, entity_id: sensor.garage_fridge_temperature,         above: 45, for: { minutes: 10 } }
      - { platform: numeric_state, id: warn,   entity_id: sensor.kitchen_fridge_temperature,        above: 40, for: { minutes: 10 } }
      - { platform: numeric_state, id: urgent, entity_id: sensor.kitchen_fridge_temperature,        above: 45, for: { minutes: 10 } }
      - { platform: numeric_state, id: warn,   entity_id: sensor.garage_fridge_freezer_temperature, above: 10, for: { minutes: 45 } }
      - { platform: numeric_state, id: urgent, entity_id: sensor.garage_fridge_freezer_temperature, above: 15, for: { minutes: 35 } }
    variables:
      names:
        sensor.garage_freezer_temperature: "Garage freezer"
        sensor.garage_fridge_temperature: "Garage fridge"
        sensor.kitchen_fridge_temperature: "Kitchen fridge"
        sensor.garage_fridge_freezer_temperature: "Garage fridge-freezer"
    action:
      - variables:
          n: "{{ names[trigger.entity_id] | default(trigger.entity_id) }}"
          crit: "{{ trigger.id == 'urgent' }}"
      - action: script.frzmon_notify
        data:
          critical: "{{ crit }}"
          title: "{{ ('🚨 ' ~ n ~ ' FAILING') if crit else ('⚠️ ' ~ n ~ ' warming') }}"
          message: "{{ n }} is {{ trigger.to_state.state }}°F (sustained over {{ trigger.above }}°F){{ ' — check it now' if crit else '' }}."

  # ---- Rate-of-rise (door-ajar / slow-failure early warning) — all units, one automation ----
  # Each *_rising trend binary_sensor fires this; the condition gates it BELOW that
  # unit's warn line so it never double-fires with the absolute warn above. Per-unit
  # temp sensor + warn line + friendly name come from the lookup dicts.
  - id: frzmon_rising_alerts
    alias: "Freezer monitor — steadily warming (all units)"
    mode: parallel
    max: 20
    trigger:
      - { platform: state, entity_id: binary_sensor.garage_freezer_rising,        to: "on", for: { minutes: 5 } }
      - { platform: state, entity_id: binary_sensor.garage_fridge_rising,         to: "on", for: { minutes: 20 } }
      - { platform: state, entity_id: binary_sensor.kitchen_fridge_rising,        to: "on", for: { minutes: 20 } }
      - { platform: state, entity_id: binary_sensor.garage_fridge_freezer_rising, to: "on", for: { minutes: 20 } }
    variables:
      temp_of:
        binary_sensor.garage_freezer_rising: sensor.garage_freezer_temperature
        binary_sensor.garage_fridge_rising: sensor.garage_fridge_temperature
        binary_sensor.kitchen_fridge_rising: sensor.kitchen_fridge_temperature
        binary_sensor.garage_fridge_freezer_rising: sensor.garage_fridge_freezer_temperature
      warn_of:
        binary_sensor.garage_freezer_rising: -5
        binary_sensor.garage_fridge_rising: 40
        binary_sensor.kitchen_fridge_rising: 40
        binary_sensor.garage_fridge_freezer_rising: 10
      names:
        binary_sensor.garage_freezer_rising: "Garage freezer"
        binary_sensor.garage_fridge_rising: "Garage fridge"
        binary_sensor.kitchen_fridge_rising: "Kitchen fridge"
        binary_sensor.garage_fridge_freezer_rising: "Garage fridge-freezer"
    condition:
      - condition: template
        value_template: "{{ states(temp_of[trigger.entity_id]) | float(999) < (warn_of[trigger.entity_id] | float) }}"
    action:
      - variables:
          n: "{{ names[trigger.entity_id] }}"
          t: "{{ temp_of[trigger.entity_id] }}"
      - action: script.frzmon_notify
        data:
          critical: false
          title: "📈 {{ n }} steadily warming"
          message: "{{ n }} is warming steadily, now {{ states(t) }}°F — door ajar or failing?"

  # ===================== OFFLINE (no reading) =====================
  # Outdoor kitchen fridge DROPPED from this list until the ESPHome unit lands —
  # its 433 link is knowingly marginal (temp alerts already disabled), so offline-
  # only alerts from it were pure noise (~15/27 fires). `for` widened 1m -> 15m to
  # ride out brief reception gaps; a genuinely dead sensor still flags after ~25m.
  # Tower/B (garage chest freezer) stays IN — its recent multi-hour dropouts are a
  # real "sensor is failing / out of range" signal, not noise to suppress.
  - id: frzmon_sensor_offline
    alias: "Freezer monitor — sensor offline"
    mode: parallel
    max: 10
    trigger:
      - platform: state
        entity_id:
          - sensor.garage_freezer_temperature
          - sensor.garage_fridge_temperature
          - sensor.kitchen_fridge_temperature
          - sensor.garage_fridge_freezer_temperature
        to: "unavailable"
        for: { minutes: 15 }
    action:
      - action: script.frzmon_notify
        data:
          critical: false
          title: "📡 Fridge/freezer sensor offline"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} — no reading for ~25 min (battery/range?)."

  # ===================== LOW BATTERY =====================
  - id: frzmon_sensor_low_battery
    alias: "Freezer monitor — low battery"
    mode: parallel
    max: 10
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.garage_freezer_sensor_battery
          - binary_sensor.garage_fridge_sensor_battery
          - binary_sensor.kitchen_fridge_sensor_battery
          - binary_sensor.garage_fridge_freezer_sensor_battery
          - binary_sensor.outdoor_kitchen_fridge_sensor_battery
        to: "on"
        for: { minutes: 5 }
    action:
      - action: script.frzmon_notify
        data:
          importance: default
          title: "🔋 Fridge/freezer sensor low battery"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} reports low battery — swap in lithium AAs."

# ---------------------------------------------------------------------------
# Shared notifier — sends to BOTH phones from one place (this replaced the
# duplicated iPhone+Pixel action pair in every one of the former 17 automations).
#   critical=true  -> "Critical Home Alerts" channel + iOS time-sensitive push
#   critical=false -> "Home Alerts" channel
#   importance      -> Android channel importance; defaults high, low-battery
#                      passes 'default' to stay a quiet/routine alert.
# ---------------------------------------------------------------------------
script:
  frzmon_notify:
    alias: "Freezer monitor — notify both phones"
    mode: parallel
    max: 20
    fields:
      title:
        description: "Notification title"
        example: "⚠️ Garage fridge warming"
      message:
        description: "Notification body"
        example: "Garage fridge is 42°F (sustained over 42°F)."
      critical:
        description: "Route to Critical Home Alerts + iOS time-sensitive"
        default: false
      importance:
        description: "Android importance: high or default"
        default: high
    sequence:
      # Defaults are applied HERE with Jinja `default()`, NOT via the `fields:`
      # `default:` keys above — HA does not reliably inject field defaults as
      # template variables, so an omitted `importance`/`critical` would render
      # empty and Android rejects an empty channel-importance (verified 2026-07-23).
      - variables:
          crit: "{{ critical | default(false) | bool }}"
          imp: "{{ importance | default('high') }}"
          chan: "{{ 'Critical Home Alerts' if crit else 'Home Alerts' }}"
          prio: "{{ 'high' if imp == 'high' else 'default' }}"
      - parallel:
          - action: notify.mobile_app_chriss_iphone
            data:
              title: "{{ title }}"
              message: "{{ message }}"
              data:
                channel: "{{ chan }}"
                importance: "{{ imp }}"
                priority: "{{ prio }}"
                ttl: 0
                push:
                  interruption-level: "{{ 'time-sensitive' if crit else 'active' }}"
          - action: notify.mobile_app_pixel_9_pro_xl
            data:
              title: "{{ title }}"
              message: "{{ message }}"
              data:
                channel: "{{ chan }}"
                importance: "{{ imp }}"
                priority: "{{ prio }}"
                ttl: 0
