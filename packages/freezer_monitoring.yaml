            channel: Critical Home Alerts
            importance: high
            priority: high
            ttl: 0
            push: { interruption-level: time-sensitive }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "🚨 Garage fridge-freezer FAILING"
          message: "Garage fridge-freezer is {{ trigger.to_state.state }}°F (>15) for 10 min — check it."
          data: { channel: Critical Home Alerts, importance: high, priority: high, ttl: 0 }

  - id: frzmon_garage_fridge_freezer_rising
    alias: "Freezer monitor — garage fridge-freezer steadily warming (door ajar?)"
    # Fridge-class: sustained ~8°F/hr rise while still below the 10°F warn line.
    trigger:
      - platform: state
        entity_id: binary_sensor.garage_fridge_freezer_rising
        to: "on"
        for: { minutes: 20 }
    condition:
      - condition: numeric_state
        entity_id: sensor.garage_fridge_freezer_temperature
        below: 10
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "📈 Garage fridge-freezer steadily warming"
          message: "Rising ~8°F/hr for 45+ min, now {{ states('sensor.garage_fridge_freezer_temperature') }}°F — door ajar or failing?"
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "📈 Garage fridge-freezer steadily warming"
          message: "Rising ~8°F/hr for 45+ min, now {{ states('sensor.garage_fridge_freezer_temperature') }}°F — door ajar or failing?"
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }

  # ===================== OFFLINE (no reading ~10 min) =====================
  - id: frzmon_sensor_offline
    alias: "Freezer monitor — sensor offline"
    trigger:
      - platform: state
        entity_id:
          - sensor.garage_freezer_temperature
          - sensor.garage_fridge_temperature
          - sensor.kitchen_fridge_temperature
          - sensor.garage_fridge_freezer_temperature
        to: "unavailable"
        for: { minutes: 1 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "📡 Fridge/freezer sensor offline"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} — no reading for ~10 min (battery/range?)."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "📡 Fridge/freezer sensor offline"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} — no reading for ~10 min (battery/range?)."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }

  # ===================== LOW BATTERY =====================
  - id: frzmon_sensor_low_battery
    alias: "Freezer monitor — low battery"
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.garage_freezer_sensor_battery
          - binary_sensor.garage_fridge_sensor_battery
          - binary_sensor.kitchen_fridge_sensor_battery
          - binary_sensor.garage_fridge_freezer_sensor_battery
        to: "on"
        for: { minutes: 5 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
