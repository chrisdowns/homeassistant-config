# Freezer / Fridge Temperature Monitoring — HA package
# ---------------------------------------------------------------------------
# Deploy: copy to the Green at /config/packages/freezer_monitoring.yaml.
# configuration.yaml already includes:
#   homeassistant:
#     packages: !include_dir_named packages
#
# Sensor map (current 2026-07-14):
#   Garage freezer  = 592TXR "Acurite-Tower" channel B (id 2082) — temp+humidity
#   Garage fridge   = 592TXR "Acurite-Tower" channel A (id 13260) — temp+humidity
#   Kitchen fridge  = 606TX "Acurite-606TX" (id 126, always channel 1) — TEMP ONLY
#
# 592TXR Towers key on the A/B/C slide switch (STABLE; device id rotates on
# battery change). 606TX has no switch — rtl_433 always tags it channel 1, so it
# publishes to rtl_433/devices/Acurite-606TX/1. Topics never collide.
#
# History note: channel A (592TXR id 13260, has humidity) WAS the kitchen fridge,
# then briefly the outdoor fridge, then parked. On 2026-07-15 it was placed in the
# GARAGE FRIDGE and wired up here. The kitchen fridge runs on the 606 now — the
# 606 couldn't reach from the OUTDOOR kitchen fridge (metal box + distance blocks
# 433MHz, even the stronger Tower went silent sealed inside), but it's rock-solid
# at the indoor kitchen fridge.
#
# Outdoor kitchen fridge: NO sensor until an AcuRite 00275RM/00276RM monitor +
# 06011RM plug-in probe arrives (rtl_433 "Acurite-00275rm"; the PROBE temp comes
# out in field temperature_1_C, onboard temp in temperature_C). That combo keeps
# the transmitter OUTSIDE the box with the probe on a lead INSIDE — the only
# architecture that beats the metal enclosure. (The 986 was a WRONG call — its
# pucks mount inside the box → same Faraday-cage failure as the 606.) When it
# lands, sniff its topic/id off MQTT and add an Acurite-00275rm block reading
# temperature_1_C + warm/offline/battery wiring. (Likely still wants receiver-side
# RF help — that spot was marginal even open-air.)
#
# rtl_433 publishes per-device JSON to rtl_433/devices/<model>/<channel>. Tower
# keys: temperature_C, humidity, battery_ok, channel; 606TX: no humidity.
# expire_after (offline window) is per-sensor. Sniff live stream to debug:
#   ssh ha-green → mosquitto_sub -h core-mosquitto -u rtl433 -P <pw> -t 'rtl_433/devices/#' -v
#   (broker creds live in the mosquitto add-on options via the supervisor API)
#
# NOTE (2026-07-14): the SDR also hears an Acurite-609TXC (id 204) reporting a
# LOW battery — a one-piece temp+humidity sensor (NOT a probe model),
# unidentified/unplaced, intentionally NOT wired here yet.
# ---------------------------------------------------------------------------

mqtt:
  sensor:
    # ==== Garage freezer : channel B ====
    - name: "Garage Freezer Temperature"
      unique_id: frzmon_garage_freezer_temp
      state_topic: "rtl_433/devices/Acurite-Tower/B"
      value_template: >-
        {% if value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 600
    - name: "Garage Freezer Humidity"
      unique_id: frzmon_garage_freezer_humidity
      state_topic: "rtl_433/devices/Acurite-Tower/B"
      value_template: "{{ value_json.humidity | int }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 600

    # ==== Garage refrigerator : channel A (592TXR id 13260) ====
    - name: "Garage Fridge Temperature"
      unique_id: frzmon_garage_fridge_temp
      state_topic: "rtl_433/devices/Acurite-Tower/A"
      value_template: >-
        {% if value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 600
    - name: "Garage Fridge Humidity"
      unique_id: frzmon_garage_fridge_humidity
      state_topic: "rtl_433/devices/Acurite-Tower/A"
      value_template: "{{ value_json.humidity | int }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      expire_after: 600

    # ==== Kitchen refrigerator : Acurite-606TX id 126 (temp-only) ====
    # Was the 592TXR on channel A; swapped to the 606 on 2026-07-14 (the 606
    # can't reach from the outdoor fridge but is rock-solid here). This model
    # has no humidity, so kitchen-fridge humidity was dropped. Tower/A is now
    # parked (awaiting a humidity-useful home — TBD).
    - name: "Kitchen Fridge Temperature"
      unique_id: frzmon_kitchen_fridge_temp
      state_topic: "rtl_433/devices/Acurite-606TX/1"
      value_template: >-
        {% if value_json.temperature_C is defined %}
          {{ (value_json.temperature_C | float * 9 / 5 + 32) | round(1) }}
        {% else %}{{ this.state | default('unknown', true) }}{% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      expire_after: 600

  binary_sensor:
    - name: "Garage Freezer Sensor Battery"
      unique_id: frzmon_garage_freezer_batt
      state_topic: "rtl_433/devices/Acurite-Tower/B"
      value_template: "{{ value_json.battery_ok | int }}"
      payload_on: "0"        # battery_ok = 0 -> low (device_class battery: on = low)
      payload_off: "1"
      device_class: battery
      expire_after: 600
    - name: "Garage Fridge Sensor Battery"
      unique_id: frzmon_garage_fridge_batt
      state_topic: "rtl_433/devices/Acurite-Tower/A"
      value_template: "{{ value_json.battery_ok | int }}"
      payload_on: "0"
      payload_off: "1"
      device_class: battery
      expire_after: 600
    - name: "Kitchen Fridge Sensor Battery"
      unique_id: frzmon_kitchen_fridge_batt
      state_topic: "rtl_433/devices/Acurite-606TX/1"
      value_template: "{{ value_json.battery_ok | int }}"
      payload_on: "0"
      payload_off: "1"
      device_class: battery
      expire_after: 600

# ---------------------------------------------------------------------------
# Rate-of-rise detector (door-ajar / slow-failure early warning, 2026-07-15).
# The garage freezer holds a dead-flat ~-15F (24h: min -16.1, max -15.2,
# stdev 0.21F — 0% of time above -15). With that quiet a baseline a sustained
# upward slope is unambiguous LONG before any absolute threshold trips, so we
# catch a cracked door while the box is still deeply frozen.
#   min_gradient 0.001389 = 5F/hour (5 / 3600 s).  sample_duration 1800 = 30 min.
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: trend
    sensors:
      garage_freezer_rising:
        friendly_name: "Garage Freezer Rising"
        entity_id: sensor.garage_freezer_temperature
        sample_duration: 1800
        min_gradient: 0.001389
        min_samples: 5
        max_samples: 50

automation:
  # ===================== GARAGE FREEZER (channel B) =====================
  - id: frzmon_garage_freezer_warm_warn
    alias: "Freezer monitor — garage freezer warm (warn)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.garage_freezer_temperature
        above: -5
        for: { minutes: 20 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "⚠️ Garage freezer warming"
          message: "Garage freezer is {{ trigger.to_state.state }}°F (>-5) for 20 min."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "⚠️ Garage freezer warming"
          message: "Garage freezer is {{ trigger.to_state.state }}°F (>-5) for 20 min."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }

  - id: frzmon_garage_freezer_warm_urgent
    alias: "Freezer monitor — garage freezer warm (URGENT)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.garage_freezer_temperature
        above: 10
        for: { minutes: 10 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "🚨 Garage freezer FAILING"
          message: "Garage freezer is {{ trigger.to_state.state }}°F (>10) for 10 min — check it."
          data:
            channel: Critical Home Alerts
            importance: high
            priority: high
            ttl: 0
            push: { interruption-level: time-sensitive }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "🚨 Garage freezer FAILING"
          message: "Garage freezer is {{ trigger.to_state.state }}°F (>10) for 10 min — check it."
          data: { channel: Critical Home Alerts, importance: high, priority: high, ttl: 0 }

  - id: frzmon_garage_freezer_rising
    alias: "Freezer monitor — garage freezer steadily warming (door ajar?)"
    # Fires on a sustained ~5°F/hr rise (trend binary_sensor) while the box is
    # still below the -5°F warn line — early door-ajar / slow-failure catch.
    trigger:
      - platform: state
        entity_id: binary_sensor.garage_freezer_rising
        to: "on"
        for: { minutes: 5 }
    condition:
      - condition: numeric_state
        entity_id: sensor.garage_freezer_temperature
        below: -5
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "📈 Garage freezer steadily warming"
          message: "Rising ~5°F/hr for 30+ min, now {{ states('sensor.garage_freezer_temperature') }}°F — door ajar or failing?"
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "📈 Garage freezer steadily warming"
          message: "Rising ~5°F/hr for 30+ min, now {{ states('sensor.garage_freezer_temperature') }}°F — door ajar or failing?"
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }

  # ===================== GARAGE REFRIGERATOR (channel A) =====================
  - id: frzmon_garage_fridge_warm_warn
    alias: "Freezer monitor — garage fridge warm (warn)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.garage_fridge_temperature
        above: 40
        for: { minutes: 10 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "⚠️ Garage fridge warming"
          message: "Garage fridge is {{ trigger.to_state.state }}°F (>40) for 10 min."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "⚠️ Garage fridge warming"
          message: "Garage fridge is {{ trigger.to_state.state }}°F (>40) for 10 min."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }

  - id: frzmon_garage_fridge_warm_urgent
    alias: "Freezer monitor — garage fridge warm (URGENT)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.garage_fridge_temperature
        above: 45
        for: { minutes: 10 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "🚨 Garage fridge FAILING"
          message: "Garage fridge is {{ trigger.to_state.state }}°F (>45) for 10 min — check it."
          data:
            channel: Critical Home Alerts
            importance: high
            priority: high
            ttl: 0
            push: { interruption-level: time-sensitive }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "🚨 Garage fridge FAILING"
          message: "Garage fridge is {{ trigger.to_state.state }}°F (>45) for 10 min — check it."
          data: { channel: Critical Home Alerts, importance: high, priority: high, ttl: 0 }

  # ===================== KITCHEN REFRIGERATOR (channel A) =====================
  - id: frzmon_kitchen_fridge_warm_warn
    alias: "Freezer monitor — kitchen fridge warm (warn)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.kitchen_fridge_temperature
        above: 40
        for: { minutes: 10 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "⚠️ Kitchen fridge warming"
          message: "Kitchen fridge is {{ trigger.to_state.state }}°F (>40) for 10 min."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "⚠️ Kitchen fridge warming"
          message: "Kitchen fridge is {{ trigger.to_state.state }}°F (>40) for 10 min."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }

  - id: frzmon_kitchen_fridge_warm_urgent
    alias: "Freezer monitor — kitchen fridge warm (URGENT)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.kitchen_fridge_temperature
        above: 45
        for: { minutes: 10 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "🚨 Kitchen fridge FAILING"
          message: "Kitchen fridge is {{ trigger.to_state.state }}°F (>45) for 10 min — check it."
          data:
            channel: Critical Home Alerts
            importance: high
            priority: high
            ttl: 0
            push: { interruption-level: time-sensitive }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "🚨 Kitchen fridge FAILING"
          message: "Kitchen fridge is {{ trigger.to_state.state }}°F (>45) for 10 min — check it."
          data: { channel: Critical Home Alerts, importance: high, priority: high, ttl: 0 }

  # ===================== OFFLINE (no reading ~10 min) =====================
  - id: frzmon_sensor_offline
    alias: "Freezer monitor — sensor offline"
    trigger:
      - platform: state
        entity_id:
          - sensor.garage_freezer_temperature
          - sensor.garage_fridge_temperature
          - sensor.kitchen_fridge_temperature
        to: "unavailable"
        for: { minutes: 1 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "📡 Fridge/freezer sensor offline"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} — no reading for ~10 min (battery/range?)."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "📡 Fridge/freezer sensor offline"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} — no reading for ~10 min (battery/range?)."
          data: { channel: Home Alerts, importance: high, priority: high, ttl: 0 }

  # ===================== LOW BATTERY =====================
  - id: frzmon_sensor_low_battery
    alias: "Freezer monitor — low battery"
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.garage_freezer_sensor_battery
          - binary_sensor.garage_fridge_sensor_battery
          - binary_sensor.kitchen_fridge_sensor_battery
        to: "on"
        for: { minutes: 5 }
    action:
      - action: notify.mobile_app_chriss_iphone
        data:
          title: "🔋 Fridge/freezer sensor low battery"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} reports low battery — swap in lithium AAs."
          data: { channel: Home Alerts, importance: default, priority: default, ttl: 0 }
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "🔋 Fridge/freezer sensor low battery"
          message: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }} reports low battery — swap in lithium AAs."
          data: { channel: Home Alerts, importance: default, priority: default, ttl: 0 }

# ---------------------------------------------------------------------------
# Orphaned entities (removed from YAML, will linger as unavailable/restored in
# the registry until deleted in the HA UI: Settings → Devices & Services →
# Entities):
#   - sensor.kitchen_fridge_humidity        (606 has no humidity)
#   - sensor.outdoor_kitchen_fridge_temperature + ..._sensor_battery
#     (606 became the kitchen sensor; outdoor waits on the 00275RM+06011RM probe)
# ---------------------------------------------------------------------------
