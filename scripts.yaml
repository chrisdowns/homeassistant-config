ensure_a_lock_is_locked:
  alias: Ensure a lock is locked
  mode: queued
  fields:
    lock_entity:
      description: Lock entity_id
      example: lock.front_door
    notify:
      description: Whether this script sends its own per-lock success/failure notifications. Set false when a caller (e.g. Nightly Door Lock) sends its own summary.
      example: true
  sequence:
  - variables:
      name: '{{ state_attr(lock_entity, ''friendly_name'') or lock_entity }}'
      notify: '{{ notify if notify is defined else true }}'
      tries: 3
      per_try_timeout: 00:00:35
      settle_after_lock: 00:00:02
      stable_for: 00:00:03
  - repeat:
      count: '{{ tries }}'
      sequence:
      - target:
          entity_id: '{{ lock_entity }}'
        action: lock.lock
        continue_on_error: true
      - delay: '{{ settle_after_lock }}'
      - wait_template: "{{ is_state(lock_entity, 'locked')\n   or is_state(lock_entity,
          'unlocking')\n   or is_state(lock_entity, 'unlocked')\n   or is_state(lock_entity,
          'locking')\n   or is_state(lock_entity, 'jammed')\n   or is_state(lock_entity,
          'unknown')\n   or is_state(lock_entity, 'unavailable') }}"
        timeout: '{{ per_try_timeout }}'
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ is_state(lock_entity, ''locked'') }}'
          sequence:
          - wait_template: '{{ is_state(lock_entity, ''locked'') }}'
            timeout: '{{ stable_for }}'
            continue_on_timeout: false
          - if:
            - condition: template
              value_template: '{{ notify }}'
            then:
            - data:
                title: Lock succeeded
                message: '{{ name }} is locked ✅'
              action: notify.notify
          - stop: Done — lock reached 'locked'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ repeat.index < tries }}'
          sequence:
          - delay: 00:00:03
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not is_state(lock_entity, ''locked'') and notify }}'
      sequence:
      - data:
          title: Lock failed
          message: '{{ name }} did not lock ❌ after {{ tries }} attempt(s). Final
            state: {{ states(lock_entity) or ''unknown'' }}.'
        action: notify.notify
      - data:
          title: Lock failed
          message: '{{ name }} ({{ lock_entity }}) failed to reach ''locked'' after
            {{ tries }} attempt(s). Final state: {{ states(lock_entity) or ''unknown''
            }}.'
        action: persistent_notification.create

media_center_start_movies:
  alias: Start Watching Movies
  mode: single
  # Projector on (SDCP) + receiver -> Firestick (Media Box) input + volume. Fire TV power
  # comes from the Alexa routine's native Fire-TV action (its CEC also powers the receiver).
  # Nanoleaf lights OFF is pending the Skylight re-pair (see placeholder below).
  sequence:
  - action: switch.turn_on          # projector first — lamp warm-up is the longest pole; don't block on it
    target:
      entity_id: switch.projector
    continue_on_error: true
  - action: media_player.turn_on
    target:
      entity_id: media_player.str_az1000es
    continue_on_error: true
  - wait_template: >-
      {{ not is_state('media_player.str_az1000es', 'unavailable')
         and not is_state('media_player.str_az1000es', 'off') }}
    timeout: '00:00:10'
    continue_on_timeout: true
  - action: media_player.volume_set
    target:
      entity_id: media_player.str_az1000es
    data:
      volume_level: 0.5   # movie-mode default; tune to taste
    continue_on_error: true
  - action: rest_command.receiver_select_firestick
  - action: light.turn_off        # movie mode = dark
    target:
      entity_id: light.skylight_67bb
    continue_on_error: true
media_center_stop_movies:
  alias: Stop Watching Movies
  mode: single
  # Turn everything off EXCEPT lights (lights come ON). Fire TV is put to sleep by the
  # Alexa "stop" routine's native Fire-TV action.
  sequence:
  - action: media_player.turn_off
    target:
      entity_id: media_player.str_az1000es
    continue_on_error: true
  - action: switch.turn_off
    target:
      entity_id: switch.projector
    continue_on_error: true
  - action: light.turn_on
    target:
      entity_id: light.skylight_67bb
    continue_on_error: true
