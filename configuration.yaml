
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_select:
  room_selector:
    name: Room Selector
    options:
      - "Living Room"
      - "Master"
      - "Kitchen"
    initial: "Living Room"
    icon: mdi:home

# Active while Nightly Door Lock is locking, so Lock Usage Notification can
# suppress its per-lock pings for the auto-lock. Self-expiring (15 min cap)
# so it can never get stuck on across a restart.
timer:
  nightly_locking:
    name: Nightly locking in progress
    duration: "00:15:00"
